<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestionar Candidatos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="CSS/Styles.css" rel="stylesheet">

<a href="index.html" class="btn btn-secondary">
<i class="bi bi-house"></i> Inicio</a>

</head>

<body>

<div class="container mt-5">

<div class="header">
<h3><i class="bi bi-people"></i> Gestión de Candidatos</h3>
</div>

<div class="card shadow">

<div class="card-header bg-primary text-white">
Registrar Nuevo Candidato
</div>

<div class="card-body">

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Nombre</label>

<input type="text" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Apellido</label>

<input type="text" class="form-control">

</div>

</div>

<div class="mb-3">

<label class="form-label">Partido</label>

<select class="form-select">

<option>Partido A</option>
<option>Partido B</option>

</select>

</div>

<button class="btn btn-success">
<i class="bi bi-person-plus"></i> Registrar Candidato
</button>

</form>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="JS/candidatos.js"></script>    
</body>
</html>
