<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Electoral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="CSS/Styles.css" rel="stylesheet">
    <style>
        .custom-gradient-1 { background: -webkit-linear-gradient(45deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-gradient-2 { background: -webkit-linear-gradient(45deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-gradient-3 { background: -webkit-linear-gradient(45deg, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

<div class="container mt-5 py-5">
    <div class="d-flex justify-content-between align-items-center mb-5 glass-card p-4">
        <div>
            <h2 class="header-title m-0"><i class="bi bi-cpu"></i> Nodo Central Votaciones</h2>
            <p class="text-muted m-0 mt-2">Plataforma de Gobernanza Digital</p>
        </div>
        <button class="btn btn-outline-glass d-flex align-items-center gap-2 px-4 py-2" onclick="sessionStorage.clear(); window.location.href='Login.html';">
            <i class="bi bi-power"></i> Desconectar
        </button>
    </div>

    <div class="row g-4 justify-content-center">
        <!-- Módulo Admin: Crear Elección -->
        <div class="col-md-3" id="card-crear-eleccion">
            <a href="CrearEleccion.html" class="text-decoration-none">
                <div class="glass-card glass-hover h-100 text-center p-4">
                    <i class="bi bi-database-add giant-icon mb-3 d-inline-block"></i>
                    <h5 class="fw-bold text-white mt-2">Crear Elección</h5>
                    <p class="text-muted small mt-2">Instanciar nuevo proceso</p>
                </div>
            </a>
        </div>
        
        <!-- Módulo: Emitir Voto -->
        <div class="col-md-3">
            <a href="EmitirVoto.html" class="text-decoration-none">
                <div class="glass-card glass-hover h-100 text-center p-4">
                    <i class="bi bi-fingerprint giant-icon custom-gradient-1 mb-3 d-inline-block"></i>
                    <h5 class="fw-bold text-white mt-2">Emitir Voto</h5>
                    <p class="text-muted small mt-2">Identidad verificada requerida</p>
                </div>
            </a>
        </div>

        <!-- Módulo: Resultados -->
        <div class="col-md-3">
            <a href="Resultados.html" class="text-decoration-none">
                <div class="glass-card glass-hover h-100 text-center p-4">
                    <i class="bi bi-bar-chart-steps giant-icon custom-gradient-2 mb-3 d-inline-block"></i>
                    <h5 class="fw-bold text-white mt-2">Resultados en Vivo</h5>
                    <p class="text-muted small mt-2">Análisis de los sufragios</p>
                </div>
            </a>
        </div>

        <!-- Módulo Admin: Candidatos -->
        <div class="col-md-3" id="card-candidatos">
            <a href="Candidatos.html" class="text-decoration-none">
                <div class="glass-card glass-hover h-100 text-center p-4">
                    <i class="bi bi-people giant-icon custom-gradient-3 mb-3 d-inline-block"></i>
                    <h5 class="fw-bold text-white mt-2">Candidatos</h5>
                    <p class="text-muted small mt-2">Registros de participantes</p>
                </div>
            </a>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const userId = sessionStorage.getItem("userId");
    const userRol = sessionStorage.getItem("userRol");

    if (!userId) { window.location.href = "Login.html"; }

    if (userRol === "votante") {
        const cardCrearEleccion = document.getElementById("card-crear-eleccion");
        if (cardCrearEleccion) cardCrearEleccion.style.display = "none";
        
        const cardCandidatos = document.getElementById("card-candidatos");
        if (cardCandidatos) cardCandidatos.style.display = "none";
    }
});
</script>
</body>
</html>
