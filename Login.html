<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votos - Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="CSS/Styles.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container" style="max-width: 500px; padding: 20px;">
    <div class="glass-card p-5 text-center">
        <i class="bi bi-fingerprint giant-icon mb-3 d-inline-block"></i>
        <h2 class="header-title mb-4">Acceso Identidad</h2>
        
        <ul class="nav nav-pills nav-justified mb-4 border-bottom border-secondary pb-3" role="tablist">
            <li class="nav-item">
                <button class="nav-link active px-4 py-2 bg-transparent text-white fw-bold" data-bs-toggle="pill" data-bs-target="#login" style="border-radius: 10px;">Acceder</button>
            </li>
            <li class="nav-item">
                <button class="nav-link px-4 py-2 bg-transparent text-white fw-bold" data-bs-toggle="pill" data-bs-target="#register" style="border-radius: 10px;">Registrar</button>
            </li>
        </ul>

        <div class="tab-content text-start">
            <!-- LOGIN -->
            <div class="tab-pane fade show active" id="login">
                <form id="loginform">
                    <div class="mb-3">
                        <label class="form-label text-muted small text-uppercase fw-bold pb-1">Credencial Electrónica</label>
                        <div class="input-group">
                            <span class="input-group-text glass-input border-end-0 bg-transparent text-muted"><i class="bi bi-person"></i></span>
                            <input type="email" id="user" name="correo" class="form-control glass-input border-start-0 ps-0" placeholder="usuario@correo.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold pb-1">Clave de Seguridad</label>
                        <div class="input-group">
                            <span class="input-group-text glass-input border-end-0 bg-transparent text-muted"><i class="bi bi-shield-lock"></i></span>
                            <input type="password" id="password" name="password" class="form-control glass-input border-start-0 ps-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-glass w-100 py-3 mt-2">Firmar e Ingresar</button>
                    <div id="login-error" class="text-danger mt-3 text-center fw-bold" style="display:none"></div>
                </form>
            </div>
            
            <!-- REGISTER -->
            <div class="tab-pane fade" id="register">
                <form id="registerform">
                    <div class="mb-3">
                        <input type="text" id="name" name="nombre" class="form-control glass-input" placeholder="Nombre completo" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" id="email" name="email" class="form-control glass-input" placeholder="Correo electrónico" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="register-password" name="password" class="form-control glass-input" placeholder="Crear contraseña" required>
                    </div>
                    <div class="mb-4">
                        <input type="password" id="register-password-confirm" name="confirm_password" class="form-control glass-input" placeholder="Confirmar contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-glass w-100 py-3 mt-2">Generar Identidad</button>
                    <div id="register-error" class="text-danger mt-3 text-center" style="display:none"></div>
                    <div id="register-success" class="text-success mt-3 text-center fw-bold" style="display:none">Identidad registrada exitosamente</div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="JS/authentication.js"></script>
</body>
</html>
