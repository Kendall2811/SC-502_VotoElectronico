<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Votaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="CSS/Styles.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 py-4" style="max-width: 900px;">
    
    <div class="glass-card mb-4 p-4 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="header-title m-0"><i class="bi bi-bar-chart-steps"></i> Auditoría de Resultados</h3>
            <p class="text-muted m-0 mt-1">Conteo en vivo extraído de la base de datos oficial.</p>
        </div>
        <a href="index.html" class="btn btn-outline-glass px-4"><i class="bi bi-house"></i> Inicio</a>
    </div>

    <div class="glass-card p-4 p-md-5">
        <h4 class="text-white mb-4 fw-bold border-bottom border-secondary pb-3"><i class="bi bi-clipboard2-data text-primary"></i> Reporte Oficial</h3>
        
        <div class="table-responsive">
            <table class="table table-borderless table-glass align-middle w-100 m-0">
                <thead>
                    <tr>
                        <th class="text-uppercase small pt-0 pb-3">Candidato y Partido</th>
                        <th class="text-uppercase small pt-0 pb-3 text-end" width="200">Sufragios</th>
                    </tr>
                </thead>
                <tbody id="tablaResultados">
                    <!-- Registros Inyectados por Javascript -->
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="JS/Resultados.js"></script>    
</body>
</html>
