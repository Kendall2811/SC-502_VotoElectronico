<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Candidatos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="CSS/Styles.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 py-4" style="max-width: 800px;">
    
    <div class="glass-card mb-4 p-4 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="header-title m-0"><i class="bi bi-people"></i> Gestión de Candidatos</h3>
            <p class="text-muted m-0 mt-1">Inscribe nuevos participantes en la red.</p>
        </div>
        <a href="index.html" class="btn btn-outline-glass px-4"><i class="bi bi-house"></i> Inicio</a>
    </div>

    <div class="glass-card p-5">
        <h4 class="text-white mb-4 fw-bold border-bottom border-secondary pb-3"><i class="bi bi-person-plus text-primary"></i> Registrar Nuevo Candidato</h4>
        
        <form>
            <div class="row g-4">
                <div class="col-md-6 mb-2">
                    <label class="form-label text-muted small text-uppercase fw-bold pb-1">Nombre</label>
                    <input type="text" class="form-control glass-input" placeholder="Nombre completo" required>
                </div>
                
                <div class="col-md-6 mb-2">
                    <label class="form-label text-muted small text-uppercase fw-bold pb-1">Apellido (Opcional)</label>
                    <input type="text" class="form-control glass-input" placeholder="Apellido">
                </div>
            </div>

            <div class="mb-4 mt-3">
                <label class="form-label text-muted small text-uppercase fw-bold pb-1">Proceso Electoral (Elección)</label>
                <select class="form-select glass-input" id="selectEleccion" name="eleccion_id" required>
                    <option value="">Seleccione una elección activa...</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="form-label text-muted small text-uppercase fw-bold pb-1">Afiliación (Partido)</label>
                <select class="form-select glass-input" id="selectPartido" required>
                    <option value="Partido A">Partido A</option>
                    <option value="Partido B">Partido B</option>
                    <option value="Partido C">Partido C</option>
                    <option value="Independiente">Independiente</option>
                </select>
            </div>

            <button class="btn btn-glass w-100 py-3 mt-2">
                <i class="bi bi-check2-circle"></i> Inscribir Candidato
            </button>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="JS/Candidatos.js"></script>    
</body>
</html>
