<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crear Elección</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="CSS/Styles.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<!-- BOTON INICIO -->

<div class="mb-3">
<a href="index.html" class="btn btn-secondary">
<i class="bi bi-house"></i> Inicio
</a>
</div>

<!-- ENCABEZADO -->

<div class="header d-flex justify-content-between align-items-center mb-4">

<div>
<h3><i class="bi bi-calendar-plus"></i> Crear Nueva Elección</h3>
<p class="mb-0">Administración del proceso electoral</p>
</div>

</div>

<!-- FORMULARIO -->

<div class="card shadow">

<div class="card-header bg-primary text-white">
<i class="bi bi-pencil-square"></i> Información de la elección
</div>

<div class="card-body">

<form id="formEleccion">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-card-text"></i> Nombre de la elección
</label>

<input 
type="text" 
id="nombre"
name="nombre"
class="form-control" 
placeholder="Ej: Elecciones Estudiantiles 2026"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-info-circle"></i> Descripción
</label>

<input 
type="text"
id="descripcion"
name="descripcion"
class="form-control"
placeholder="Descripción breve de la elección">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-calendar-event"></i> Fecha de inicio
</label>

<input 
type="date"
id="fecha_inicio"
name="fecha_inicio"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-calendar-check"></i> Fecha de finalización
</label>

<input 
type="date"
id="fecha_fin"
name="fecha_fin"
class="form-control"
required>

</div>

</div>

<hr>

<div class="d-flex justify-content-end gap-2">

<button type="reset" class="btn btn-secondary">
<i class="bi bi-x-circle"></i> Cancelar
</button>

<button type="submit" class="btn btn-success">
<i class="bi bi-check-circle"></i> Crear Elección
</button>

</div>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="JS/crear_eleccion.js"></script>

</body>
</html>
