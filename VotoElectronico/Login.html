<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Votaciones</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="./CSS/Styles.css" rel="stylesheet">

</head>

<body>

<div class="container login-container shadow-lg mt-5">

<div class="row g-0">

<!-- PANEL IZQUIERDO -->

<div class="col-md-5 left-panel text-center p-4">

<i class="bi bi-check2-square vote-icon fs-1"></i>

<h2>Sistema de Votaciones</h2>

<p class="mt-3">
Plataforma segura para la gestión de elecciones, candidatos y votaciones.
</p>

<hr>

<p class="small">
Accede para participar o administrar el proceso electoral.
</p>

</div>

<!-- PANEL DERECHO -->

<div class="col-md-7 right-panel p-4">

<ul class="nav nav-tabs mb-4">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">
<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">
<i class="bi bi-person-plus"></i> Registrarse
</button>
</li>

</ul>

<div class="tab-content">

<!-- LOGIN -->

<div class="tab-pane fade show active" id="login">

<form action="login.php" method="post">

<div class="mb-3">

<label class="form-label">Usuario</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

<input 
type="email"
id="user"
name="correo"
class="form-control"
placeholder="Ingrese su correo"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Contraseña</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input 
type="password"
id="password"
name="password"
class="form-control"
placeholder="Ingrese su contraseña"
required>

<button 
type="button"
class="btn btn-outline-secondary"
onclick="togglePass('password',this)">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<button type="submit" class="btn btn-primary w-100">
Ingresar
</button>

</form>

</div>

<!-- REGISTER -->

<div class="tab-pane fade" id="register">

<form id="registerform">

<div class="mb-3">

<label class="form-label">Nombre Completo</label>

<input 
type="text" 
id="name"
name="nombre"
class="form-control" 
placeholder="Ingrese su nombre completo"
required>

</div>

<div class="mb-3">

<label class="form-label">Correo</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input 
type="email" 
id="email"
name="email"
class="form-control"
placeholder="Ingrese su correo"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Contraseña</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input 
type="password" 
id="register-password"
name="password"
class="form-control"
placeholder="Crear contraseña"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Confirmar contraseña</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input 
type="password" 
id="register-password-confirm"
name="confirm_password"
class="form-control"
placeholder="Confirmar contraseña"
required>

</div>

</div>

<button type="submit" class="btn btn-success w-100">
Crear Cuenta
</button>

<div id="register-error" class="text-danger mt-3" style="display:none"></div>

<div id="register-success" class="text-success mt-3" style="display:none">
Registro exitoso
</div>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="JS/authentication.js"></script>

</body>
</html>
