<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Elección</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="CSS/Styles.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 py-4" style="max-width: 800px;">
    
    <div class="glass-card mb-4 p-4 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="header-title m-0"><i class="bi bi-database-add"></i> Crear Proceso Electoral</h3>
            <p class="text-white m-0 mt-1">Registra una nueva votación en el nodo central.</p>
        </div>
        <a href="index.html" class="btn btn-outline-glass px-4"><i class="bi bi-house"></i> Inicio</a>
    </div>

    <div class="glass-card p-5">
        <h4 class="text-white mb-4 fw-bold border-bottom border-secondary pb-3"><i class="bi bi-calendar-event text-primary"></i> Datos de la Elección</h4>

        <form>
            <div class="mb-4">
                <label class="form-label text-white small text-uppercase fw-bold pb-1">Nombre de la Elección</label>
                <input type="text" class="form-control glass-input" placeholder="Ej. Elecciones Presidenciales 2026" required>
            </div>
            
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label text-white small text-uppercase fw-bold pb-1">Fecha de Inicio</label>
                    <input type="date" class="form-control glass-input text-white" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label text-white small text-uppercase fw-bold pb-1">Fecha de Finalización</label>
                    <input type="date" class="form-control glass-input text-white" required>
                </div>
            </div>

            <!-- <div class="mb-4">
                <label class="form-label text-muted small text-uppercase fw-bold pb-1">Descripción / Objetivos</label>
                <textarea class="form-control glass-input" rows="3" placeholder="Detalles operativos..."></textarea>
            </div> -->

            <button class="btn btn-glass w-100 py-3 mt-3">
                <i class="bi bi-cloud-arrow-up"></i> Registrar y Publicar
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="JS/CrearEleccion.js"></script>    
</body>
</html>
